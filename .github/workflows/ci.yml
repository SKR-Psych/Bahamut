name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-backend:
    name: Rust — bahamut-desktop backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bahamut-desktop/src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev
        working-directory: .

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      # tauri-build resolves the frontendDist path at compile time
      - name: Create empty frontend dist
        run: mkdir -p apps/bahamut-desktop/dist
        working-directory: .

      - name: cargo fmt
        run: cargo fmt -- --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test (sandbox adversarial + audit chain + file I/O)
        run: cargo test

  frontend:
    name: Frontend — React/TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bahamut-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/bahamut-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

  windows-package:
    name: Windows — Tauri packaging
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/bahamut-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/bahamut-desktop/package-lock.json

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      # Windows-only Rust tests exercise the ADS / reserved-device-name /
      # 8.3 short-name sandbox protections that Linux cannot cover.
      - name: cargo test (Windows-specific sandbox protections)
        run: cargo test
        working-directory: apps/bahamut-desktop/src-tauri

      - name: Tauri packaging build
        run: npm run tauri build

      - name: Upload Windows bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bahamut-windows-bundle
          path: apps/bahamut-desktop/src-tauri/target/release/bundle/
          retention-days: 7
